{% extends 'base.html' %}
{% block title %}Editar usuario - CacaoTrace{% endblock %}
{% block content %}
<h1 class="h3 fw-bold mb-3">Editar usuario</h1>

<div class="card shadow-sm border-0">
    <div class="card-body">
        <form method="post" class="row g-3">

            <div class="col-md-6">
                <label class="form-label" for="username">Usuario</label>
                <input
                    class="form-control"
                    id="username"
                    name="username"
                    value="{{ usuario.username }}"
                    required
                >
            </div>

            <div class="col-md-6">
                <label class="form-label" for="email">Correo</label>
                <input
                    class="form-control"
                    type="email"
                    id="email"
                    name="email"
                    value="{{ usuario.email }}"
                    required
                >
            </div>

            <div class="col-md-6">
                <label class="form-label" for="role_id">Rol</label>
                <select
                    class="form-select"
                    id="role_id"
                    name="role_id"
                    required
                >
                    {% for rol in roles %}
                    <option
                        value="{{ rol.id }}"
                        {% if usuario.role_id == rol.id %}selected{% endif %}
                    >
                        {{ rol.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="password">Nueva contraseña</label>
                <input
                    class="form-control"
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Dejar vacío si no se cambia"
                >
            </div>

            <div class="col-12">
                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        id="is_active"
                        name="is_active"
                        {% if usuario.is_active %}checked{% endif %}
                    >
                    <label class="form-check-label" for="is_active">
                        Usuario activo
                    </label>
                </div>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-cacao">
                    Actualizar usuario
                </button>

                <a class="btn btn-outline-secondary" href="{{ url_for('main.usuarios') }}">
                    Cancelar
                </a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
