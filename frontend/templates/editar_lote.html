{% extends 'base.html' %}
{% block title %}Editar lote - CacaoTrace{% endblock %}
{% block content %}
<h1 class="h3 fw-bold mb-3">Editar lote {{ lote.codigo }}</h1>
<div class="alert alert-warning">Modifica estos datos solo cuando sea necesario. Los cambios afectan la trazabilidad del lote.</div>
<div class="card shadow-sm border-0">
    <div class="card-body">
        <form method="post" class="row g-3">
            <div class="col-md-6"><label class="form-label">Productor</label><select class="form-select" name="productor_id" required>{% for productor in productores %}<option value="{{ productor.id }}" {% if lote.productor_id == productor.id %}selected{% endif %}>{{ productor.nombres }}</option>{% endfor %}</select></div>
            <div class="col-md-6"><label class="form-label">Finca</label><select class="form-select" name="finca_id" required>{% for finca in fincas %}<option value="{{ finca.id }}" {% if lote.finca_id == finca.id %}selected{% endif %}>{{ finca.nombre }} - {{ finca.productor.nombres }}</option>{% endfor %}</select></div>
            <div class="col-md-4"><label class="form-label">Kg inicial</label><input class="form-control" type="number" step="0.01" min="0" name="cantidad_inicial_kg" value="{{ lote.cantidad_inicial_kg }}" required></div>
            <div class="col-md-4"><label class="form-label">Kg actual</label><input class="form-control" type="number" step="0.01" min="0" name="cantidad_actual_kg" value="{{ lote.cantidad_actual_kg }}" required></div>
            <div class="col-md-4"><label class="form-label">Estado</label><select class="form-select" name="estado" required>{% for e in estados %}<option value="{{ e }}" {% if lote.estado == e %}selected{% endif %}>{{ e }}</option>{% endfor %}</select></div>
            <div class="col-12"><button class="btn btn-cacao">Actualizar lote</button><a class="btn btn-outline-secondary" href="{{ url_for('main.detalle_lote', lote_id=lote.id) }}">Cancelar</a></div>
        </form>
    </div>
</div>
{% endblock %}
