{% block content %}
<h1 class="h3 fw-bold mb-3">Editar finca</h1>

<div class="card shadow-sm border-0">
    <div class="card-body">
        <form method="post" class="row g-3">

            <div class="col-md-6">
                <label class="form-label" for="nombre">Nombre finca</label>
                <input
                    class="form-control"
                    id="nombre"
                    name="nombre"
                    value="{{ finca.nombre }}"
                    required
                >
            </div>

            <div class="col-md-6">
                <label class="form-label" for="productor_id">Productor</label>
                <select
                    class="form-select"
                    id="productor_id"
                    name="productor_id"
                    required
                >
                    {% for productor in productores %}
                        <option
                            value="{{ productor.id }}"
                            {% if finca.productor_id == productor.id %}selected{% endif %}
                        >
                            {{ productor.nombres }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="vereda">Vereda</label>
                <input
                    class="form-control"
                    id="vereda"
                    name="vereda"
                    value="{{ finca.vereda or '' }}"
                >
            </div>

            <div class="col-md-6">
                <label class="form-label" for="municipio">Municipio</label>
                <input
                    class="form-control"
                    id="municipio"
                    name="municipio"
                    value="{{ finca.municipio }}"
                >
            </div>

            <div class="col-md-6">
                <label class="form-label" for="hectareas">Hectáreas</label>
                <input
                    class="form-control"
                    type="number"
                    step="0.01"
                    id="hectareas"
                    name="hectareas"
                    value="{{ finca.hectareas or '' }}"
                >
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-cacao">
                    Actualizar finca
                </button>

                <a
                    class="btn btn-outline-secondary"
                    href="{{ url_for('main.fincas') }}"
                >
                    Cancelar
                </a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
