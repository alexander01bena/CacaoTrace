{% block content %}
<h1 class="h3 fw-bold mb-3">
    {% if proceso %}Editar proceso poscosecha{% else %}Proceso poscosecha{% endif %} - {{ lote.codigo }}
</h1>

<div class="card shadow-sm border-0">
    <div class="card-body">
        <form method="post" class="row g-3">

            <div class="col-md-4">
                <label class="form-label" for="fermentacion">Fermentación</label>
                <select class="form-select" id="fermentacion" name="fermentacion" required>
                    <option value="">Seleccione...</option>
                    {% for f in ['No iniciada','En proceso','Finalizada'] %}
                    <option value="{{ f }}" {% if proceso and proceso.fermentacion==f %}selected{% endif %}>
                        {{ f }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label" for="secado">Secado</label>
                <select class="form-select" id="secado" name="secado" required>
                    <option value="">Seleccione...</option>
                    {% for s in ['No iniciado','En proceso','Finalizado'] %}
                    <option value="{{ s }}" {% if proceso and proceso.secado==s %}selected{% endif %}>
                        {{ s }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label" for="estado_proceso">Estado del lote</label>
                <select class="form-select" id="estado_proceso" name="estado_proceso" required>
                    <option value="">Seleccione...</option>
                    {% for e in ['Fermentación','Secado','Inventario','Vendido'] %}
                    <option value="{{ e }}" {% if proceso and proceso.estado_proceso==e %}selected{% endif %}>
                        {{ e }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12">
                <label class="form-label" for="observaciones">Observaciones</label>
                <textarea class="form-control" id="observaciones" name="observaciones"
                    rows="4">{{ proceso.observaciones if proceso else '' }}</textarea>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-cacao">
                    {% if proceso %}Actualizar poscosecha{% else %}Guardar poscosecha{% endif %}
                </button>

                <a class="btn btn-outline-secondary" href="{{ url_for('main.detalle_lote', lote_id=lote.id) }}">
                    Cancelar
                </a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
