{% extends 'base.html' %}
{% block title %}Editar recepción - CacaoTrace{% endblock %}
{% block content %}
<h1 class="h3 fw-bold mb-3">Editar recepción</h1>

<div class="card shadow-sm border-0">
    <div class="card-body">
        <form method="post" class="row g-3">

            <div class="col-md-6">
                <label class="form-label" for="productor_id">Productor</label>
                <select class="form-select" id="productor_id" name="productor_id" required>
                    {% for productor in productores %}
                    <option value="{{ productor.id }}" {% if recepcion.productor_id == productor.id %}selected{% endif %}>
                        {{ productor.nombres }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="finca_id">Finca</label>
                <select class="form-select" id="finca_id" name="finca_id" required>
                    {% for finca in fincas %}
                    <option value="{{ finca.id }}" {% if recepcion.finca_id == finca.id %}selected{% endif %}>
                        {{ finca.nombre }} - {{ finca.productor.nombres }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label" for="tipo_cacao">Tipo de cacao</label>
                <select class="form-select" id="tipo_cacao" name="tipo_cacao" required>
                    <option value="Cacao fresco" {% if recepcion.tipo_cacao == 'Cacao fresco' %}selected{% endif %}>
                        Cacao fresco
                    </option>
                    <option value="Cacao seco" {% if recepcion.tipo_cacao == 'Cacao seco' %}selected{% endif %}>
                        Cacao seco
                    </option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label" for="cantidad_kg">Cantidad kg</label>
                <input
                    class="form-control"
                    type="number"
                    step="0.01"
                    min="0.01"
                    id="cantidad_kg"
                    name="cantidad_kg"
                    value="{{ recepcion.cantidad_kg }}"
                    required
                >
            </div>

            <div class="col-md-4">
                <label class="form-label" for="fecha_recepcion">Fecha</label>
                <input
                    class="form-control"
                    type="date"
                    id="fecha_recepcion"
                    name="fecha_recepcion"
                    value="{{ recepcion.fecha_recepcion }}"
                >
            </div>

            <div class="col-12">
                <label class="form-label" for="observaciones">Observaciones</label>
                <textarea
                    class="form-control"
                    id="observaciones"
                    name="observaciones"
                    rows="4"
                >{{ recepcion.observaciones or '' }}</textarea>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-cacao">
                    Actualizar recepción
                </button>

                <a class="btn btn-outline-secondary" href="{{ url_for('main.recepciones') }}">
                    Cancelar
                </a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
